services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: ccgql-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ccgql
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ccgql" ]
      interval: 10s
      timeout: 5s
      retries: 5